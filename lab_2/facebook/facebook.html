<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook — вход</title>
  <link rel="stylesheet" href="facebook.css" />
</head>
<body>
  <div class="page">
    <div class="container">
      
      <div class="left">
        <h1 class="logo">facebook</h1>
        <p class="subtitle">
          Facebook помогает вам всегда оставаться на связи и общаться со своими знакомыми.
        </p>
      </div>

      <div class="right">
        <div class="card">
          <form>
            <input type="text" placeholder="Электронный адрес или номер телефона" />
            <input type="password" placeholder="Пароль" />

            <button class="btn-login" type="submit">Вход</button>

            <a class="forgot" href="#">Забыли пароль?</a>

            <div class="line"></div>

            <button class="btn-create" type="button">Создать новый аккаунт</button>
          </form>
        </div>

        <p class="create-page">
          <a href="#"><b>Создать Страницу</b></a> знаменитости, музыкальной группы или компании.
        </p>
      </div>

    </div>
  </div>
</body>
</html>
