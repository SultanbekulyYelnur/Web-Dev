<article class="card" [class.open]="openedShareId === product.id">
  <a [href]="product.link" target="_blank" rel="noopener" class="img-link">
    <div class="img-wrap">
      <button class="nav prev" (click)="prevImage($event)"><</button>
      <img [src]="selectedImage" [alt]="product.name" />
      <button class="nav next" (click)="nextImage($event)">></button>
    </div>
  </a>
  <div class="thumbs">
    <img
      [src]="product.image"
      (click)="setImage(product.image)"
      [alt]="product.name"
    />
    <img
      *ngFor="let img of product.images"
      [src]="img"
      [alt]="product.name"
      (click)="setImage(img)"
      [class.active]="selectedImage === img"
    />
  </div>

  <a
    [href]="product.link"
    target="_blank"
    rel="noopener"
    class="product-link"
  >
    <h3 class="name">{{ product.name }}</h3>
  </a>

  <p class="desc">{{ product.description }}</p>

  <div class="meta">
    <span class="price">{{ product.price }} KZT</span>

    <div class="rating">
      <span class="stars" aria-label="Rating {{ product.rating }} out of 5">
      <span
        *ngFor="let s of starStates"
        class="star"
        [class.full]="s === 'full'"
        [class.half]="s === 'half'"
        [class.empty]="s === 'empty'"
      >★</span>
    </span>
      <span class="rating-num">{{ product.rating }}</span>
    </div>

  </div>
  <div class="actions">
    <button class="like" (click)="like()"
            [class.liked]="product.likes > 0"
            [class.animate]="animateLike"
    >
      🩷 {{product.likes}}
    </button>
    <button class="del" (click)="requestDelete()">🗑️ Delete</button>

    <div class="share">
      <button (click)="toggleShare()">Share</button>

      <div class="share-menu" *ngIf="openedShareId === product.id">
        <button (click)="shareWhatsApp()">WhatsApp</button>
        <button (click)="shareTelegram()">Telegram</button>
      </div>

    </div>
  </div>

</article>
