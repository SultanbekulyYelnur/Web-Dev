<div class="albums-page">
  <div class="page-header">
    <h1>Albums</h1>
    <span class="count-badge" *ngIf="!loading">{{ albums.length }} albums</span>
  </div>

  <!-- Loading -->
  <div class="loading-state" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading albums...</p>
  </div>

  <!-- Error -->
  <div class="error-state" *ngIf="error">
    <p>⚠️ {{ error }}</p>
  </div>

  <!-- Empty -->
  <div class="empty-state" *ngIf="!loading && !error && albums.length === 0">
    <p>🎵 No albums found.</p>
  </div>

  <!-- List -->
  <div class="albums-list" *ngIf="!loading && !error && albums.length > 0">
    <div
      class="album-item"
      *ngFor="let album of albums"
      (click)="navigateToDetail(album.id)"
    >
      <div class="album-info">
        <span class="album-id">#{{ album.id }}</span>
        <span class="album-title">{{ album.title }}</span>
      </div>
      <button
        class="btn-delete"
        (click)="deleteAlbum($event, album.id)"
        title="Delete album"
      >
        🗑️ Delete
      </button>
    </div>
  </div>
</div>
